services:
    postgres:
        image: postgres:18.3
        restart: always
        volumes:
            - ov-data:/var/lib/postgresql
        ports:
            - 5433:5432
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: ov-db
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d ov-db"]
            interval: 2s
            timeout: 5s
            retries: 30
            start_period: 5s

volumes:
    ov-data:
