[build]
base = "."
command = "pnpm --filter @okay-vote/web build"
publish = "apps/web/dist"

[build.environment]
NODE_VERSION = "24.14.1"
PNPM_VERSION = "10.33.0"

[[edge_functions]]
path = "/votes/*"
function = "vote-seo"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.okay.vote"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/api/*"
to = "https://api.okay.vote/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
