name: api

on:
    push:
        paths:
            - 'apps/api/**'
            - 'packages/contracts/**'
            - 'docker-compose.yml'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
            - 'tsconfig.base.json'
            - '.eslintrc.js'
            - '.prettierrc'
    pull_request:
        paths:
            - 'apps/api/**'
            - 'packages/contracts/**'
            - 'docker-compose.yml'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
            - 'tsconfig.base.json'
            - '.eslintrc.js'
            - '.prettierrc'

jobs:
    api:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: docker compose up -d postgres
            - run: |
                  for i in {1..30}; do
                    if docker compose exec -T postgres pg_isready -U postgres -d ov-db; then
                      exit 0
                    fi
                    sleep 1
                  done
                  exit 1
              shell: bash
            - run: pnpm --filter @okay-vote/api lint
            - run: pnpm --filter @okay-vote/api typecheck
            - run: pnpm --filter @okay-vote/api test
            - run: pnpm --filter @okay-vote/api build
