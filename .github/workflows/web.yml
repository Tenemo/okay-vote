name: Web

on:
    push:
        branches:
            - master
        paths:
            - 'apps/web/**'
            - 'packages/contracts/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
            - 'tsconfig.base.json'
            - 'eslint.config.js'
            - '.prettierrc'
    pull_request:
        paths:
            - 'apps/web/**'
            - 'packages/contracts/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
            - 'tsconfig.base.json'
            - 'eslint.config.js'
            - '.prettierrc'

concurrency:
    group: web-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    web:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter @okay-vote/web lint
            - run: pnpm --filter @okay-vote/web typecheck
            - run: pnpm --filter @okay-vote/web test
            - run: pnpm --filter @okay-vote/web build
