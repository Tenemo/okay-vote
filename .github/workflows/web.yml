name: web

on:
    push:
        paths:
            - 'apps/web/**'
            - 'packages/contracts/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
            - 'tsconfig.base.json'
            - '.eslintrc.js'
            - '.prettierrc'
    pull_request:
        paths:
            - 'apps/web/**'
            - 'packages/contracts/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
            - 'tsconfig.base.json'
            - '.eslintrc.js'
            - '.prettierrc'

jobs:
    web:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm --filter @okay-vote/web lint
            - run: pnpm --filter @okay-vote/web typecheck
            - run: pnpm --filter @okay-vote/web test
            - run: pnpm --filter @okay-vote/web build
