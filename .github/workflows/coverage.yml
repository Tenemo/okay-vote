name: coverage

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
    merge_group:

concurrency:
    group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    coverage:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: ov-db
                ports:
                    - 5433:5432
                options: >-
                    --health-cmd="pg_isready -U postgres -d ov-db"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/ov-db
            NODE_ENV: test

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate API coverage
              run: pnpm --filter @okay-vote/api test:coverage

            - name: Generate web coverage
              run: pnpm --filter @okay-vote/web test:coverage

            - name: Upload API coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  disable_search: true
                  fail_ci_if_error: true
                  files: ./apps/api/coverage/lcov.info
                  flags: api
                  token: ${{ secrets.CODECOV_TOKEN }}
                  verbose: true

            - name: Upload web coverage to Codecov
              if: always()
              uses: codecov/codecov-action@v5
              with:
                  disable_search: true
                  fail_ci_if_error: true
                  files: ./apps/web/coverage/lcov.info
                  flags: web
                  token: ${{ secrets.CODECOV_TOKEN }}
                  verbose: true
